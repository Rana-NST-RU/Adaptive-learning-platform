version: '3.9'

networks:
  alos-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:

services:
  # ─────────────────────────────────────────
  # PostgreSQL (Primary Database)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: alos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alos_password}
      POSTGRES_DB: ${POSTGRES_DB:-alos_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - alos-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-alos_user} -d ${POSTGRES_DB:-alos_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (Cache + Session + Bull Queue)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alos-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - alos-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Neo4j (Knowledge Graph)
  # ─────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: alos-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-alos_neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
      NEO4J_dbms_memory_heap_initial__size: '512m'
      NEO4J_dbms_memory_heap_max__size: '1G'
    ports:
      - '7474:7474'   # Browser UI
      - '7687:7687'   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - alos-network
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # NestJS API (Backend)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: alos-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-alos_user}:${POSTGRES_PASSWORD:-alos_password}@postgres:5432/${POSTGRES_DB:-alos_db}
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-alos_neo4j_password}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      MSG91_API_KEY: ${MSG91_API_KEY}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-ALOSSN}
      ML_SERVICE_URL: http://ml-service:8000
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - alos-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/api/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # Python ML Service (FastAPI + Groq)
  # ─────────────────────────────────────────
  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    container_name: alos-ml-service
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-alos_user}:${POSTGRES_PASSWORD:-alos_password}@postgres:5432/${POSTGRES_DB:-alos_db}
      ENVIRONMENT: development
    ports:
      - '8000:8000'
    volumes:
      - ./services/ml-service/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alos-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # Next.js Web (Frontend)
  # ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: alos-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-nextauth-secret-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    depends_on:
      - api
    networks:
      - alos-network
